############################################
# log4jdbc 설정 (Spring Boot 권장 버전)
############################################

# log4jdbc의 SQL 로깅을 SLF4J로 전달
log4jdbc.spylogdelegator.name=net.sf.log4jdbc.log.slf4j.Slf4jSpyLogDelegator

# SQL 한 줄로 출력 (0 = 줄바꿈 없이 전체 출력)
log4jdbc.dump.sql.maxlinelength=0

# PreparedStatement 파라미터 로그 출력
log4jdbc.dump.sql.select=true
log4jdbc.dump.sql.insert=true
log4jdbc.dump.sql.update=true
log4jdbc.dump.sql.delete=true

# DB 연결/닫기 로그
log4jdbc.debug.stack.prefix=jdbc

# 실제 사용할 JDBC Driver 지정
log4jdbc.drivers=com.mysql.cj.jdbc.Driver

# Popular driver 자동 로딩 비활성화 (명시적으로 지정한 드라이버만 사용)
log4jdbc.auto.load.popular.drivers=false
