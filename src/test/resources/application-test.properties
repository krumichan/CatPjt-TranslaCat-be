spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:translacat_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.sql.init.mode=never

jwt.token.secret-key=test-secret-key-test-secret-key-test-secret-key
jwt.token.expired.access=86400000
jwt.token.expired.refresh=604800000

spring.ai.google.genai.api-key=test
ai-server.url=http://localhost:8000
ai-server.api-key=test
external.google.proxy-url=http://localhost
external.use-proxy=false
cors.allowed-origin=http://localhost:3000

sudachi.dictionary.path=src/main/resources/system_full.dic

# google info
spring.security.oauth2.client.registration.google.client-id=test.apps.googleusercontent.com

# result set table.
logging.level.jdbc.resultsettable=INFO
